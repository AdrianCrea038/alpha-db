<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Admin - Crear Usuario</title>
    <style>
        body {
            background: #0a0a0f;
            color: #e2e8f0;
            font-family: monospace;
            padding: 2rem;
        }
        input, button {
            padding: 0.5rem;
            margin: 0.5rem;
            background: #1e1e2c;
            border: 1px solid #4b5563;
            color: white;
            border-radius: 4px;
        }
        button {
            background: #2d4ed6;
            cursor: pointer;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        pre { background: #1e1e2c; padding: 1rem; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🧪 Test Admin - Crear Usuario</h1>
    
    <div>
        <input type="text" id="username" placeholder="Usuario" value="prueba">
        <input type="password" id="password" placeholder="Contraseña" value="Prueba123">
        <button id="createBtn">Crear Usuario</button>
    </div>
    
    <div id="result"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const SUPABASE_URL = 'https://cdiwriptqmqnexxukqaf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vX6RQCfPpA14Pg9ZVgDrFg_l3jY7KVw';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const createBtn = document.getElementById('createBtn');
        const resultDiv = document.getElementById('result');
        
        createBtn.onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            resultDiv.innerHTML = '<div>⏳ Creando usuario...</div>';
            
            try {
                const { data, error } = await supabase
                    .from('usuarios')
                    .insert([{
                        username: username,
                        password: password,
                        is_master: false,
                        permisos: ['comparator', 'history']
                    }])
                    .select();
                
                if (error) throw error;
                
                resultDiv.innerHTML = `
                    <div class="success">✅ Usuario creado exitosamente</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
