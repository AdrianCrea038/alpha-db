<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha DB - Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Estilos de respaldo por si login.css no carga */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0D1117;
        }
        .login-container {
            width: 400px;
            padding: 50px 40px;
            background: #161B22;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.25);
        }
        .user-icon-section {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
        }
        .line {
            flex: 1;
            height: 1px;
            background: rgba(0, 212, 255, 0.4);
        }
        .user-icon {
            width: 80px;
            height: 80px;
            border: 2px solid #00D4FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00D4FF;
            margin: 0 15px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #0D1117;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .input-group:focus-within {
            border-color: #00D4FF;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.15);
        }
        .input-icon {
            padding: 12px 15px;
            color: #00D4FF;
            border-right: 1px solid rgba(0, 212, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-field {
            flex: 1;
            padding: 14px 15px;
            background: transparent;
            border: none;
            outline: none;
            color: #FFFFFF;
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .input-field::placeholder {
            color: #8B949E;
            letter-spacing: 2px;
            font-weight: 400;
        }
        .login-btn {
            margin-top: 10px;
            padding: 14px;
            background: linear-gradient(90deg, #00D4FF 0%, #0099CC 100%);
            border: none;
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background: linear-gradient(90deg, #33DDFF 0%, #00AADD 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8B949E;
            font-size: 12px;
            cursor: pointer;
            position: relative;
            padding-left: 25px;
            font-weight: 500;
        }
        .remember-me input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }
        .checkmark {
            position: absolute;
            left: 0;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 4px;
            background: transparent;
            transition: all 0.2s;
        }
        .remember-me input:checked ~ .checkmark {
            background: #00D4FF;
            border-color: #00D4FF;
        }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 5px;
            top: 2px;
            width: 4px;
            height: 8px;
            border: solid #0D1117;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .remember-me input:checked ~ .checkmark:after {
            display: block;
        }
        .forgot-password {
            color: #8B949E;
            font-size: 12px;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }
        .forgot-password:hover {
            color: #00D4FF;
        }
        .divider {
            margin: 40px 0 20px;
            height: 1px;
            background: rgba(0, 212, 255, 0.3);
        }
        .footer {
            text-align: center;
            color: #8B949E;
            font-size: 12px;
            font-weight: 400;
        }
        .footer span {
            color: #00D4FF;
            font-weight: 700;
        }
        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #FF4444;
            color: #FF4444;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
        }
        @media (max-width: 480px) {
            .login-container { width: 90%; padding: 40px 25px; }
            .options { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="user-icon-section">
            <div class="line"></div>
            <div class="user-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="line"></div>
        </div>

        <form class="login-form" id="loginForm">
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <input type="text" id="username" placeholder="USERNAME" class="input-field" autocomplete="off">
            </div>

            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" id="password" placeholder="••••••" class="input-field">
            </div>

            <button type="submit" class="login-btn">LOGIN</button>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" checked>
                    <span class="checkmark"></span>
                    Recordarme
                </label>
                <a href="#" class="forgot-password" id="forgotPassword">¿Olvidaste tu contraseña?</a>
            </div>
        </form>

        <div class="divider"></div>

        <div class="footer">
            designed by <span>Alpha Master</span>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
